<div style="font-family: Arial, Helvetica, sans-serif; max-width: 560px; margin: 0 auto; background: #ffffff; border-radius: 12px; overflow: hidden; border: 1px solid #e5e5e5;">

  <div style="background: #7a1f1f; padding: 24px 28px;">
    <p style="margin: 0; color: #f0d9a8; font-size: 12px; letter-spacing: 1px; text-transform: uppercase;">Elshaddai Fire Ministries International</p>
    <h1 style="margin: 6px 0 0; color: #ffffff; font-size: 20px; font-weight: 600;">New Prayer Request</h1>
  </div>

  <div style="padding: 28px;">
    <p style="margin: 0 0 20px; color: #333333; font-size: 14px; line-height: 1.6;">
      A new prayer request has come in through the website. Here are the details:
    </p>

    <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
      <tr>
        <td style="padding: 8px 0; color: #888888; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; width: 110px; vertical-align: top;">Name</td>
        <td style="padding: 8px 0; color: #222222; font-size: 15px; font-weight: 600;">{{name}}</td>
      </tr>
      <tr>
        <td style="padding: 8px 0; color: #888888; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; vertical-align: top;">Email</td>
        <td style="padding: 8px 0; color: #222222; font-size: 15px;">{{email}}</td>
      </tr>
      <tr>
        <td style="padding: 8px 0; color: #888888; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; vertical-align: top;">Country</td>
        <td style="padding: 8px 0; color: #222222; font-size: 15px;">{{country}}</td>
      </tr>
    </table>

    <div style="background: #faf3e8; border-left: 4px solid #7a1f1f; border-radius: 6px; padding: 16px 18px;">
      <p style="margin: 0 0 6px; color: #888888; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;">Prayer Request</p>
      <p style="margin: 0; color: #333333; font-size: 15px; line-height: 1.6; white-space: pre-wrap;">{{prayer_request}}</p>
    </div>

    <p style="margin: 24px 0 0; color: #aaaaaa; font-size: 12px; text-align: center;">
      Sent from the EFMI website prayer request form
    </p>
  </div>

</div>
